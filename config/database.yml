default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: myapp
  password: 1234
  host: localhost

development:
  <<: *default
  database: hos_app_development

test:
  <<: *default
  database: hos_app_test

production:
  <<: *default
  database: hos_app_production
